<script type="module">
/* Render ```mermaid diagrams client-side, themed to match the page (light/dark),
   and re-render when the light/dark toggle flips. Loaded only on pages that have a
   diagram (see primer.sh). Needs http(s) — served by watch.sh or GitHub Pages. */
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

var blocks = document.querySelectorAll("pre.mermaid");
blocks.forEach(function (el) { el.dataset.src = el.textContent; });

function themeName() {
  var t = document.documentElement.getAttribute("data-theme")
    || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  return t === "dark" ? "dark" : "neutral";
}

async function renderAll() {
  mermaid.initialize({ startOnLoad: false, theme: themeName(), securityLevel: "strict" });
  blocks.forEach(function (el) {
    el.removeAttribute("data-processed");
    el.innerHTML = el.dataset.src;
  });
  try {
    await mermaid.run({ querySelector: "pre.mermaid" });
  } catch (e) {
    if (window.console) console.warn("mermaid:", e);
  }
}

renderAll();

// Re-theme diagrams when the toggle flips <html data-theme>.
new MutationObserver(function (muts) {
  for (var i = 0; i < muts.length; i++) {
    if (muts[i].attributeName === "data-theme") { renderAll(); break; }
  }
}).observe(document.documentElement, { attributes: true });
</script>
