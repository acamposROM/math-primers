<script>
/* Make section headers linkable: append a hover "#" that links to the heading's id.
   Pandoc already gives headings ids from their text. */
document.querySelectorAll("h1[id], h2[id], h3[id], h4[id]").forEach(function (h) {
  if (h.querySelector(".header-anchor")) return;
  var a = document.createElement("a");
  a.className = "header-anchor";
  a.href = "#" + h.id;
  a.setAttribute("aria-label", "Link to this section");
  a.textContent = "#";
  h.appendChild(a);
});
</script>
